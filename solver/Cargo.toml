[package]
name = "solver"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json"] }
m0-liquidity-sdk = "0.0.2"
order_book = { version = "0.1.0", path = "../svm/programs/order_book" }
hex = "0.4.3"
dotenvy = "0.15"
alloy = { version = "1.0", features = [
    "providers",
    "provider-ws",
    "sol-types",
    "contract",
    "rpc-types",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures-util = "0.3"
anchor-client = { version = "0.31.1", features = ["async"] }

[dev-dependencies]
tokio-test = "0.4"
