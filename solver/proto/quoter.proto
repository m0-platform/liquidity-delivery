syntax = "proto3";

package quoter;

// Service definition for the QuoteService, which allows clients to subscribe to quote updates via a bidirectional streaming RPC.
service QuoteService {
    // Bidirectional streaming RPC for quote subscriptions
    rpc SubscribeToQuotes(stream QuoteResponseProto) returns (stream QuoteRequestProto);
}

message QuoteRequestProto {
    string request_id = 1;
    string input_token = 2;
    uint32 input_chain_id = 3;
    string output_token = 4;
    uint32 output_chain_id = 5;
    string amount_in = 6;
}

message QuoteResponseProto {
    string request_id = 1;
    string quote_id = 2;
    uint32 fee_bps = 3;
    string output_amount = 4;
    uint32 est_fill_time_seconds = 5;
    uint64 expires_at = 6;
    bool rejected = 7;
    string reject_reason = 8;
    string solver_address = 9;
    bool requires_exclusivity = 10;
    string solver_name = 11;
}
