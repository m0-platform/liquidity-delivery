services:
  # Surfpool - Local Solana validator with program deployment
  surfpool:
    image: surfpool/surfpool:latest
    container_name: surfpool
    command: >
      start
      --host 0.0.0.0
      --no-tui
      --manifest-file-path /app/txtx.yml
      --rpc-url https://hatty-73mn84-fast-mainnet.helius-rpc.com
      -l debug
      -r local-setup
      -a test4MzZzYk2NAP1222FSuKqq83GuXY5tHakqREDHPo
      -a 24PNhTaNtomHhoy3fTRaMhAFCRj4uHqhZEEoWrKDbR5p
    working_dir: /app
    volumes:
      - ./config/solana-keypair.json:/root/.config/solana/id.json:ro
      - ../txtx.yml:/app/txtx.yml:ro
      - ../Anchor.toml:/app/Anchor.toml:ro
      - ../target:/app/target:ro
      - ../svm/programs:/app/svm/programs:ro
      - ../svm/runbooks:/app/svm/runbooks:ro
    ports:
      - "8899:8899"
      - "8900:8900"
      - "18488:18488"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8899'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - liquidity-network

  # Solana token funder - funds accounts with USDC via Surfpool cheatcodes
  solana-funder:
    image: curlimages/curl:latest
    container_name: solana-funder
    depends_on:
      surfpool:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/fund-solana.sh"]
    volumes:
      - ./scripts/fund-solana.sh:/scripts/fund-solana.sh:ro
    environment:
      - SURFPOOL_RPC=http://surfpool:8899
    networks:
      - liquidity-network

  # Anvil node - Chain A (local Ethereum)
  anvil-chain-a:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: anvil-chain-a
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "1", "--block-time", "1", "-v"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s
    networks:
      - liquidity-network

  # Anvil node - Chain B (local Base)
  anvil-chain-b:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: anvil-chain-b
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "8453", "--block-time", "1", "-v"]
    ports:
      - "8546:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s
    networks:
      - liquidity-network

  # Contract deployer - deploys OrderBook and ERC20 tokens to Anvil nodes
  deployer:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.deployer
    container_name: liquidity-deployer
    depends_on:
      anvil-chain-a:
        condition: service_healthy
      anvil-chain-b:
        condition: service_healthy
    environment:
      - CHAIN_A_RPC=http://anvil-chain-a:8545
      - CHAIN_B_RPC=http://anvil-chain-b:8545
    networks:
      - liquidity-network

  # Liquidity server - provides quotes via gRPC and HTTP API
  liquidity-server:
    build:
      context: ../../liquidity-toolkit
      dockerfile: Dockerfile.local
      target: liquidity-api-server
    container_name: liquidity-server
    depends_on:
      deployer:
        condition: service_completed_successfully
      surfpool:
        condition: service_healthy
      anvil-chain-a:
        condition: service_healthy
      anvil-chain-b:
        condition: service_healthy
    env_file:
      - ../../liquidity-toolkit/packages/server/.env.local
    environment:
      - LOCAL_ASSETS_FILE=/app/config/local-assets.json
    volumes:
      - ./config/local-assets.json:/app/config/local-assets.json:ro
    ports:
      - "5600:5600"   # HTTP API
      - "50052:50051" # gRPC
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5600/supported-assets').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - liquidity-network

  # Solver service - processes orders across chains
  solver:
    build:
      context: ..
      dockerfile: solver/Dockerfile
    container_name: liquidity-solver
    depends_on:
      liquidity-server:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
    volumes:
      - ./config/solver-local.yaml:/app/config.yaml:ro
    ports:
      - "3001:3001"
    networks:
      - liquidity-network

  # Frontend - Vue 3 application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: liquidity-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
    depends_on:
      liquidity-server:
        condition: service_healthy
    networks:
      - liquidity-network

networks:
  liquidity-network:
    driver: bridge
