# Dev environment configuration for the solver

environment: development
network: devnet

# HTTP API port
http_port: 3001

# Quoter connection
quoter_grpc_url: http://quoter.railway.internal:50051
connect_to_quote_stream: true

liquidity_api_url: http://api-devnet-devnet.up.railway.app
loki_url: http://loki.railway.internal:3100

# RPC rate limiting
rpc_rate_limit:
  max_requests_per_second: 10
  burst_size: 20

# Order configuration
max_order_clip_size: 2
max_clip_reprocess_delay_sec: 60
solver_fee_bps: 5
auto_rebalance: false
exclusive_mode: false

