# Dev environment configuration for the solver

environment: development
network: devnet

# HTTP API port
http_port: 3001

# Quoter connection
quoter_grpc_url: http://quoter.railway.internal:50051
connect_to_quote_stream: true

liquidity_api_url: http://api-devnet-devnet.up.railway.app

# RPC rate limiting
rpc_rate_limit:
  max_requests_per_second: 10
  burst_size: 20

# Order configuration
max_order_clip_size: 5000
max_clip_reprocess_delay_sec: 60
solver_fee_bps: 5
auto_rebalance: false

evm_private_key: "5a4ee9382b2dcff9a2caa22b1087ff9dd2c3f7d4f72e4acba43bb75f9be5b426"
