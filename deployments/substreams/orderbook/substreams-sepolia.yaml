specVersion: v0.1.0
package:
  name: sepolia-orderbook
  version: v0.1.0
  url: https://github.com/m0-foundation/liquidity-delivery
  description: Substreams module for the M0 OrderBook program on Sepolia

imports:
  ethcommon: https://spkg.io/streamingfast/ethereum-common-v0.3.3.spkg

protobuf:
  files:
    - program.proto
  descriptorSets:
    - module: buf.build/streamingfast/substreams-sink-sql
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../../target/wasm32-unknown-unknown/release/substreams.wasm

modules:
  - name: map_evm_events
    kind: map
    initialBlock: 10108380
    blockFilter:
      module: ethcommon:index_events
      query:
        string: evt_addr:0xe39b012ab3b20e94a9beea557eb0de4171d4d3e4
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:substreams.v1.program.Data

params:
  map_evm_events: "1115511"

sink:
  module: map_evm_events
  type: sf.substreams.sink.sql.v1.Service

network: sepolia
