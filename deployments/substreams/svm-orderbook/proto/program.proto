syntax = "proto3";

package substreams.v1.program;

message Data {
  repeated CancelReported cancel_reported_event_list = 1;
  repeated DestinationSupportUpdated destination_support_updated_event_list = 2;
  repeated FillReported fill_reported_event_list = 3;
  repeated OrderCancelled order_cancelled_event_list = 4;
  repeated OrderCompleted order_completed_event_list = 5;
  repeated OrderFilled order_filled_event_list = 6;
  repeated OrderOpened order_opened_event_list = 7;
  repeated RefundClaimed refund_claimed_event_list = 8;
}

message CancelReported {
  string transaction_hash = 1;
  string order_id = 2;
}

message DestinationSupportUpdated {
  string transaction_hash = 1;
  uint32 dest_chain_id = 2;
  bool is_supported = 3;
}

message FillReported {
  string transaction_hash = 1;
  string order_id = 2;
  uint64 amount_in_to_release = 3;
  uint64 amount_out_filled = 4;
  string origin_recipient = 5;
}

message OrderCancelled {
  string transaction_hash = 1;
  string order_id = 2;
}

message OrderCompleted {
  string transaction_hash = 1;
  string order_id = 2;
}

message OrderFilled {
  string transaction_hash = 1;
  string order_id = 2;
  string solver = 3;
  uint64 amount_in_to_release = 4;
  uint64 amount_out_filled = 5;
}

message OrderOpened {
  string transaction_hash = 1;
  string order_id = 2;
  string sender = 3;
  string token_in = 4;
  uint64 amount_in = 5;
  uint32 dest_chain_id = 6;
  string token_out = 7;
  uint64 amount_out = 8;
  string solver = 9;
}

message RefundClaimed {
  string transaction_hash = 1;
  string order_id = 2;
  string sender = 3;
  uint64 amount = 4;
}
