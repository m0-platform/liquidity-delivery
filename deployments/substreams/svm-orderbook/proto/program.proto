syntax = "proto3";

import "sf/substreams/sink/sql/schema/v1/schema.proto";

package substreams.v1.program;

message Data {
  repeated CancelReported cancel_reported_event_list = 1;
  repeated FillReported fill_reported_event_list = 2;
  repeated OrderCancelled order_cancelled_event_list = 3;
  repeated OrderCompleted order_completed_event_list = 4;
  repeated OrderFilled order_filled_event_list = 5;
  repeated OrderOpened order_opened_event_list = 6;
  repeated RefundClaimed refund_claimed_event_list = 7;
}

message CancelReported {
  option (schema.table) = { name: "events_cancel_reported" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
}

message FillReported {
  option (schema.table) = { name: "events_fill_reported" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
  uint64 amount_in_to_release = 5;
  uint64 amount_out_filled = 6;
  string origin_recipient = 7;
}

message OrderCancelled {
  option (schema.table) = { name: "events_order_cancelled" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
}

message OrderCompleted {
  option (schema.table) = { name: "events_orde_completed" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
}

message OrderFilled {
  option (schema.table) = { name: "events_order_filled" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
  string solver = 5;
  uint64 amount_in_to_release = 6;
  uint64 amount_out_filled = 7;
}

message OrderOpened {
  option (schema.table) = { name: "events_order_opened" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
  string sender = 5;
  string token_in = 6;
  uint64 amount_in = 7;
  uint32 dest_chain_id = 8;
  string token_out = 9;
  uint64 amount_out = 10;
  string solver = 11;
}

message RefundClaimed {
  option (schema.table) = { name: "events_refund_claimed" };

  string id = 1 [(schema.field) = { primary_key: true }];
  uint64 ts = 2;
  string transaction_hash = 3;
  string order_id = 4;
  string sender = 5;
  uint64 amount = 6;
}
