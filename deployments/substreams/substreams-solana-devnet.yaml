specVersion: v0.1.0
package:
  name: solana-devnet-orderbook
  version: v0.1.0
  url: https://github.com/m0-foundation/liquidity-delivery
  description: Substreams module for the M0 OrderBook program on Solana

imports:
  solana: https://spkg.io/streamingfast/solana-common-v0.3.3.spkg

protobuf:
  files:
    - program.proto
  descriptorSets:
    - module: buf.build/streamingfast/substreams-sink-sql
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams/rpc
    - sf/substreams/v1
    - sf/substreams/sink
    - sf/substreams/index
    - sf/substreams/index/v1
    - instructions.proto # sol.instructions.v1 from the v0.2.0 spkg
    - transactions.proto # sol.transactions.v1 from the v0.2.0 spkg
    - google

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ../../target/wasm32-unknown-unknown/release/substreams.wasm

modules:
  - name: map_svm_events
    kind: map
    initialBlock: 436247835
    inputs:
      - params: string
      - map: solana:blocks_without_votes
    output:
      type: proto:substreams.v1.program.Data
    blockFilter:
      module: solana:program_ids_without_votes
      query:
        string: program:MzLoYnJ6sF6eeejs4vV95TNmXqS3W4cAtLGKkjT4ZrK

params:
  map_svm_events: "1399811150"

sink:
  module: map_svm_events
  type: sf.substreams.sink.sql.v1.Service

network: solana-devnet
