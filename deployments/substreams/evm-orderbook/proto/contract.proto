syntax = "proto3";

import "google/protobuf/timestamp.proto";

package contract.v1;

message Events {
    repeated Orderbook_AdminChanged orderbook_admin_changeds = 1;
    repeated Orderbook_CancelReported orderbook_cancel_reporteds = 2;
    repeated Orderbook_DestinationSupportUpdated orderbook_destination_support_updateds = 3;
    repeated Orderbook_Eip712DomainChanged orderbook_eip712_domain_changeds = 4;
    repeated Orderbook_FillReported orderbook_fill_reporteds = 5;
    repeated Orderbook_Initialized orderbook_initializeds = 6;
    repeated Orderbook_OrderCancelled orderbook_order_cancelleds = 7;
    repeated Orderbook_OrderCompleted orderbook_order_completeds = 8;
    repeated Orderbook_OrderFilled orderbook_order_filleds = 9;
    repeated Orderbook_OrderOpened orderbook_order_openeds = 10;
    repeated Orderbook_Paused orderbook_pauseds = 11;
    repeated Orderbook_RefundClaimed orderbook_refund_claimeds = 12;
    repeated Orderbook_RoleAdminChanged orderbook_role_admin_changeds = 13;
    repeated Orderbook_RoleGranted orderbook_role_granteds = 14;
    repeated Orderbook_RoleRevoked orderbook_role_revokeds = 15;
    repeated Orderbook_Unpaused orderbook_unpauseds = 16;
    repeated Orderbook_Upgraded orderbook_upgradeds = 17;
}

message Orderbook_AdminChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes previous_admin = 5;
    bytes new_admin = 6;
}

message Orderbook_CancelReported {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
}

message Orderbook_DestinationSupportUpdated {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    uint64 dest_chain_id = 5;
    bool is_supported = 6;
}

message Orderbook_Eip712DomainChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
}

message Orderbook_FillReported {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
    bytes origin_recipient = 6;
    string amount_in_to_release = 7;
    string amount_out_filled = 8;
}

message Orderbook_Initialized {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    uint64 version = 5;
}

message Orderbook_OrderCancelled {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
    bytes message_id = 6;
}

message Orderbook_OrderCompleted {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
}

message Orderbook_OrderFilled {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
    bytes solver = 6;
    string amount_in_to_release = 7;
    string amount_out_filled = 8;
    bytes message_id = 9;
}

message Orderbook_OrderOpened {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
    bytes sender = 6;
    bytes token_in = 7;
    string amount_in = 8;
    uint64 dest_chain_id = 9;
    bytes token_out = 10;
    string amount_out = 11;
    bytes solver = 12;
}

message Orderbook_Paused {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes account = 5;
}
message Orderbook_RefundClaimed {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes order_id = 5;
    bytes sender = 6;
    string amount_in_refunded = 7;
}

message Orderbook_RoleAdminChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes role = 5;
    bytes previous_admin_role = 6;
    bytes new_admin_role = 7;
}

message Orderbook_RoleGranted {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes role = 5;
    bytes account = 6;
    bytes sender = 7;
}
message Orderbook_RoleRevoked {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes role = 5;
    bytes account = 6;
    bytes sender = 7;
}

message Orderbook_Unpaused {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes account = 5;
}

message Orderbook_Upgraded {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes implementation = 5;
}
